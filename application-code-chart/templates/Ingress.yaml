apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{.Values.backendServiceName}}
                port:
                  number: 3500
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{.Values.frontendServiceName}}
                port:
                  number: 3000
