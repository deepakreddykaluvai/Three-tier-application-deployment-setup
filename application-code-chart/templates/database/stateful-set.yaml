apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{.Release.Name}}-mongo
spec:
  serviceName: mongo
  replicas: {{.Values.database.replicaCount}}
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: {{.Release.Name}}-mongo-container
          image: {{.Values.database.image.repository}}:{{.Values.database.image.tag}}
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi